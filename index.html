<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Expat Community Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;800&family=Noto+Sans+Devanagari&family=Noto+Sans+Gurmukhi&display=swap" rel="stylesheet">
    <style>
        :root { --maltese-red: #CF142B; --warm-limestone: #F9F3E9; --deep-blue: #003366; }
        body { font-family: 'Inter', 'Noto Sans Devanagari', 'Noto Sans Gurmukhi', sans-serif; background-color: var(--warm-limestone); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .sun-shadow { box-shadow: 0 20px 40px -15px rgba(184, 134, 11, 0.15); }
        .hero-gradient { background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1599908618055-6453912643a6?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .nav-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .page-content { display: none; }
        .active-view { display: block !important; }
        .lang-card:hover { border-color: var(--maltese-red); background-color: #FFF5F5; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="nav-glass sticky top-0 z-50 border-b border-orange-100 px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-extrabold text-[#003366] cursor-pointer flex items-center gap-2" onclick="showHome()">
            <span class="text-[#CF142B]">M*</span> Malta Hub
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleLangModal()" class="flex items-center gap-2 bg-white border border-orange-200 px-4 py-2 rounded-full text-sm font-bold shadow-sm hover:shadow-md transition-all">
                🌐 <span id="currentLang">English</span>
            </button>
        </div>
    </nav>

    <header id="hero" class="hero-gradient h-[60vh] flex items-center justify-center text-center px-4 active-view">
        <div class="max-w-3xl">
            <h1 class="text-4xl md:text-6xl text-white mb-6 leading-tight drop-shadow-lg" id="hero-text">Your Maltese Sunshine awaits! Join the Community.</h1>
            <button onclick="document.getElementById('grid-start').scrollIntoView({behavior:'smooth'})" class="bg-[#CF142B] text-white px-10 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform sun-shadow">
                Start Your Journey
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-16 px-6" id="grid-start">
        
        <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 active-view">
            </div>

        <div id="article-view" class="page-content bg-white p-8 md:p-16 rounded-[2.5rem] shadow-2xl border border-orange-50">
            <button onclick="showHome()" class="mb-10 text-[#CF142B] font-bold flex items-center gap-2 hover:gap-4 transition-all uppercase tracking-widest text-sm">
                ← Back to Community Grid
            </button>
            <div id="article-body" class="prose prose-lg max-w-none prose-headings:text-[#003366] prose-p:text-slate-600">
                </div>
        </div>
    </main>

    <footer class="bg-[#003366] text-orange-50 py-16 px-6 text-center">
        <div class="mb-8 font-serif text-3xl">Malta Expat Hub</div>
        <p class="opacity-70 max-w-md mx-auto mb-8">Centralized 2026 resource for expats from around the globe moving to the sunny heart of the Mediterranean.</p>
        <div class="text-xs opacity-50 uppercase tracking-widest">© 2026 No Rights Reserved - Built for the Community</div>
    </footer>

    <div id="langModal" class="fixed inset-0 bg-[#003366]/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] p-10 max-w-3xl w-full">
            <h2 class="text-3xl font-bold mb-8 text-center text-[#003366]">Select Your Language</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="langOptions">
                </div>
            <button onclick="toggleLangModal()" class="w-full mt-8 text-slate-400 font-bold hover:text-red-500 transition-colors">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
