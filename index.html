<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Wiki | Expat Dashboard 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .wiki-header { font-family: 'Playfair Display', serif; }
        .sidebar-active { background-color: #f1f5f9; border-left: 4px solid #CF142B; color: #003366; }
        .hero-splash { 
            height: 350px; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1516483642775-82b85ec8803b?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            border-radius: 1.5rem;
        }
        aside { height: 100vh; position: sticky; top: 0; }
        .wiki-card { background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1.5rem; }
    </style>
</head>
<body class="flex flex-col lg:flex-row">

    <aside class="w-full lg:w-72 bg-white border-r border-slate-200 flex flex-col p-6 z-50">
        <div class="text-2xl font-bold text-[#003366] mb-10 flex items-center gap-2">
            <span class="text-[#CF142B]">M*</span> Wiki
        </div>
        
        <nav class="flex-grow space-y-1" id="sidebar-nav">
            </nav>

        <div class="mt-auto pt-6 border-t border-slate-100">
            <button onclick="toggleLangModal()" class="w-full bg-slate-100 p-3 rounded-xl flex items-center justify-between hover:bg-slate-200 transition">
                <span class="text-sm font-semibold">🌐 <span id="langDisplay">English</span></span>
                <span class="text-xs text-slate-400">Change</span>
            </button>
        </div>
    </aside>

    <main class="flex-grow p-4 lg:p-10 max-w-6xl mx-auto">
        
        <div class="hero-splash flex items-end p-8 mb-10">
            <div class="text-white">
                <h1 class="text-4xl lg:text-5xl font-bold wiki-header mb-2" id="main-title">Malta Expat Knowledge Base</h1>
                <p class="text-lg opacity-90" id="main-subtitle">April 2026 Certified Information</p>
            </div>
        </div>

        <div id="wiki-content" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>

    </main>

    <div id="langModal" class="fixed inset-0 bg-slate-900/60 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-xl w-full grid grid-cols-2 gap-3 shadow-2xl">
            <h3 class="col-span-2 text-xl font-bold mb-4">Select Language</h3>
            <button onclick="updateLang('en', 'English')" class="p-3 border rounded-lg hover:bg-slate-50 text-left">🇬🇧 English</button>
            <button onclick="updateLang('it', 'Italiano')" class="p-3 border rounded-lg hover:bg-slate-50 text-left">🇮🇹 Italiano</button>
            <button onclick="updateLang('es', 'Español')" class="p-3 border rounded-lg hover:bg-slate-50 text-left">🇪🇸 Español</button>
            <button onclick="updateLang('fr', 'Français')" class="p-3 border rounded-lg hover:bg-slate-50 text-left">🇫🇷 Français</button>
            <button onclick="updateLang('de', 'Deutsch')" class="p-3 border rounded-lg hover:bg-slate-50 text-left">🇩🇪 Deutsch</button>
            <button onclick="updateLang('hi', 'हिन्दी')" class="p-3 border rounded-lg hover:bg-slate-50 text-left">🇮🇳 हिन्दी</button>
            <button onclick="updateLang('pa', 'ਪੰਜਾਬੀ')" class="p-3 border rounded-lg hover:bg-slate-50 text-left">🇮🇳 ਪੰਜਾਬੀ</button>
            <button onclick="updateLang('tl', 'Filipino')" class="p-3 border rounded-lg hover:bg-slate-50 text-left">🇵🇭 Filipino</button>
            <button onclick="updateLang('pt-br', 'Português')" class="p-3 border rounded-lg hover:bg-slate-50 text-left">🇧🇷 Português</button>
            <button onclick="toggleLangModal()" class="col-span-2 mt-4 py-2 text-slate-400">Cancel</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
