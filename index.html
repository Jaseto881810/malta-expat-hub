<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malta Expat Hub 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&family=Noto+Sans+Devanagari&family=Noto+Sans+Gurmukhi&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans Devanagari', 'Noto Sans Gurmukhi', sans-serif; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-[#FDFBF7] text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-bold text-blue-800 cursor-pointer" onclick="showPage('home')">MALTA EXPAT HUB</div>
        
        <div class="flex items-center space-x-4">
            <button onclick="toggleModal()" class="border px-4 py-1 rounded-full text-sm font-medium hover:bg-slate-50">
                🌐 <span id="currentLangDisplay">English</span>
            </button>
            <button id="menuBtn" class="lg:hidden">☰</button>
        </div>
    </nav>

    <div id="content-area">
        </div>

    <div id="langModal" class="modal">
        <div class="bg-white p-8 rounded-3xl max-w-2xl w-full mx-4 grid grid-cols-2 md:grid-cols-3 gap-4">
            <button onclick="changeLang('en', 'English')" class="p-4 border rounded-xl hover:bg-blue-50">🇬🇧 English</button>
            <button onclick="changeLang('it', 'Italiano')" class="p-4 border rounded-xl hover:bg-blue-50">🇮🇹 Italiano</button>
            <button onclick="changeLang('es', 'Español')" class="p-4 border rounded-xl hover:bg-blue-50">🇪🇸 Español</button>
            <button onclick="changeLang('fr', 'Français')" class="p-4 border rounded-xl hover:bg-blue-50">🇫🇷 Français</button>
            <button onclick="changeLang('de', 'Deutsch')" class="p-4 border rounded-xl hover:bg-blue-50">🇩🇪 Deutsch</button>
            <button onclick="changeLang('hi', 'हिन्दी')" class="p-4 border rounded-xl hover:bg-blue-50">🇮🇳 हिन्दी</button>
            <button onclick="changeLang('pa', 'ਪੰਜਾਬੀ')" class="p-4 border rounded-xl hover:bg-blue-50">🇮🇳 ਪੰਜਾਬੀ</button>
            <button onclick="changeLang('tl', 'Filipino')" class="p-4 border rounded-xl hover:bg-blue-50">🇵🇭 Filipino</button>
            <button onclick="changeLang('pt-br', 'Português')" class="p-4 border rounded-xl hover:bg-blue-50">🇧🇷 Português</button>
            <button onclick="toggleModal()" class="col-span-full mt-4 text-slate-400 text-sm">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
